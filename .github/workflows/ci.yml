name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - php: '8.2'
            php-packages: php8.2-cli php8.2-xml php8.2-mbstring php8.2-curl
          - php: '8.3'
            php-packages: php8.3-cli php8.3-xml php8.3-mbstring php8.3-curl

    steps:
      - uses: actions/checkout@v4

      - name: Install PHP ${{ matrix.php }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.php-packages }} unzip
          php -v

      - name: Install Composer
        run: |
          curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
          composer --version

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run tests
        run: composer test

      - name: Static analysis
        if: matrix.php == '8.3'
        run: composer phpstan

      - name: Audit dependencies
        if: matrix.php == '8.3'
        run: composer audit

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify static site assets
        run: |
          test -f public/index.html
          test -f public/css/site.css
          grep -q 'href="/css/site.css"' public/index.html
          grep -q "style-src 'self'" nginx/geooptimizer.dev.conf
