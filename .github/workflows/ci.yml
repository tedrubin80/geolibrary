name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PHP
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli php-xml php-mbstring php-curl unzip
          php -v

      - name: Install Composer
        run: |
          curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
          composer --version

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run tests
        run: composer test

      - name: Static analysis
        run: composer phpstan

      - name: Audit dependencies
        run: composer audit

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify static site assets
        run: |
          test -f public/index.html
          test -f public/css/site.css
          grep -q 'href="/css/site.css"' public/index.html
          grep -q "style-src 'self'" nginx/geooptimizer.dev.conf
