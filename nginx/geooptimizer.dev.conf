server {
    server_name geooptimizer.dev www.geooptimizer.dev;

    root /var/www/geo/public;
    index index.html index.htm;

    # Security headers — applied at server level
    # NOTE: any location block that defines its own add_header directives must repeat
    # these, because nginx does not inherit add_header from outer contexts.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    # Inline styles moved to /css/site.css for a stricter CSP.
    add_header Content-Security-Policy "default-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets.
    # Security headers must be repeated here — nginx does not inherit add_header
    # from the server block when a location block defines its own add_header directives.
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        error_log off;
    }

    access_log /var/log/nginx/geooptimizer.dev.access.log;
    error_log /var/log/nginx/geooptimizer.dev.error.log;

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/geooptimizer.dev-0001/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/geooptimizer.dev-0001/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.geooptimizer.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = geooptimizer.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name geooptimizer.dev www.geooptimizer.dev;
    return 404; # managed by Certbot
}
